name: Daily ETF Signal Update
on:
  schedule:
    - cron: '30 6 * * 1-5'  # 台灣時間下午2:30，週一到週五
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas numpy
      - name: Update ETF signals
        run: python scripts/update_signals.py
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/etf_signals.json
          git diff --staged --quiet || git commit -m "Update ETF signals $(date +'%Y/%m/%d')"
          git push
